<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daynex B2B - Yönetim Paneli</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.css" rel="stylesheet">
    <link href="style.css" rel="stylesheet">
</head>
<body>

    <div class="container py-5">
        <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center mb-5 border-bottom pb-3">
            <div>
                <h1 class="page-title">🚀 Daynex API Kontrol Paneli</h1>
                <p class="text-muted mb-0">CodeIgniter 3 RESTful API & jQuery Entegrasyonu</p>
            </div>
            
            <div class="mt-3 mt-md-0 d-flex flex-wrap gap-2 align-items-center">
                <form id="jwtForm" class="input-group input-group-sm" style="max-width: 320px;">
                    <span class="input-group-text bg-dark text-white border-dark">🔑 JWT:</span>
                    <input type="password" id="jwtTokenInput" class="form-control border-dark" placeholder="Token yapıştır ve Enter'la..." autocomplete="off" required>
                    <button type="submit" class="btn btn-dark border-dark">Kaydet</button>
                </form>
                <button id="btnReloadAll" class="btn btn-sm btn-outline-primary fw-medium">🔄 Tüm Verileri Yenile</button>
            </div>
        </div>

        <div class="row g-4">
            <div class="col-lg-4">
                
                <div class="card mb-4">
                    <div class="card-header bg-dark text-white py-3">📁 Yeni Kategori Oluştur</div>
                    <div class="card-body p-4">
                        <form id="categoryForm">
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Kategori Adı</label>
                                <input type="text" id="catName" class="form-control" placeholder="Örn: Elektronik, Tekstil" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Açıklama</label>
                                <textarea id="catDesc" class="form-control" rows="2" placeholder="Kategori ayrıntıları..." required></textarea>
                            </div>
                            <button type="submit" class="btn btn-dark w-100 fw-medium">Kategoriyi Kaydet</button>
                        </form>
                    </div>
                </div>

                <div class="card">
                    <div class="card-header bg-primary text-white py-3">📦 Yeni Ürün Ekle</div>
                    <div class="card-body p-4">
                        <form id="productForm">
                            <div class="mb-3">
                                <label class="form-label fw-semibold">İlişkili Kategori (Canlı Veri)</label>
                                <select id="catSelect" class="form-select" required>
                                    <option value="">Yükleniyor...</option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Ürün Adı</label>
                                <input type="text" id="pName" class="form-control" placeholder="Örn: Logi Mouse" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Fiyat (TL)</label>
                                <input type="number" step="0.01" id="pPrice" class="form-control" placeholder="Örn: 850" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Stok Adedi</label>
                                <input type="number" id="pStock" class="form-control" value="50" required>
                            </div>
                            <button type="submit" class="btn btn-success w-100 fw-medium">Ürünü Veritabanına Yaz</button>
                        </form>
                    </div>
                </div>

            </div>

            <div class="col-lg-8">
                <div class="card">
                    <div class="card-header bg-white text-dark py-3 border-bottom">
                        <span class="fs-5 text-secondary fw-bold">📋 Mevcut Ürünler & Kategori Eşleşmeleri</span>
                    </div>
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-hover table-striped mb-0 align-middle">
                                <thead class="table-light">
                                    <tr>
                                        <th class="ps-4">ID</th>
                                        <th>Ürün Adı</th>
                                        <th>Kategori Name (JOIN)</th>
                                        <th>Fiyat</th>
                                        <th>Stok</th>
                                        <th class="pe-4 text-end">Eylemler</th>
                                    </tr>
                                </thead>
                                <tbody id="productTableBody">
                                    </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
